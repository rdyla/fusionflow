
<style>
#ff360*{box-sizing:border-box;margin:0;padding:0}
#ff360{font-family:-apple-system,'Helvetica Neue',Arial,sans-serif;border-radius:14px;overflow:hidden}
@keyframes ff-spin{to{transform:rotate(360deg)}}
.ff-spin{transform-origin:300px 270px;animation:ff-spin 45s linear infinite}
.ff-seg{cursor:pointer}
</style>

<div id="ff360">
  <div style="background:#0d1c30;padding:24px 28px 22px;text-align:center">
    <div style="font-size:10px;letter-spacing:.2em;color:#4ade80;font-weight:700;text-transform:uppercase;margin-bottom:5px">FusionFlow360 · Customer Journey</div>
    <div style="font-size:22px;font-weight:700;color:#fff;margin-bottom:9px">Where Every Engagement Finds Its Flow</div>
    <div style="font-size:12.5px;color:#7fadd0;line-height:1.7;max-width:520px;margin:0 auto">From the first discovery call to long-term growth, every client engagement moves through a deliberate journey — built to deliver clarity, momentum, and measurable outcomes. Circular. Evolving. Never static.</div>
  </div>
  <div style="background:#f4f8fe;padding:20px 12px 8px">
    <svg id="ff360-svg" viewBox="0 0 600 540" width="100%" style="display:block;max-width:600px;margin:0 auto"></svg>
  </div>
  <div id="ff360-detail" style="background:#fff;border-top:1px solid #ddeaf7"></div>
</div>

<script>
(function(){
  var CX=300,CY=270,RO=175,RI=108,active=0;

  var phases=[
    {n:1,name:'Evaluate',color:'#4d9fd6',s:230,e:310,
     headline:'Clarity before commitment.',
     desc:'We partner with you to understand your business challenges and identify the right technology and service providers — so you move forward with confidence, not guesswork.',
     steps:['Discovery','Assess','Analysis','Vendor Selection']},
    {n:2,name:'Implement',color:'#22c55e',s:320,e:40,
     headline:'Execution with expertise.',
     desc:'Our subject matter experts are embedded in every implementation — ensuring the full potential and measurable impact of your chosen solutions are realized from day one.',
     steps:['Kick-Off','Plan','Design','Train / UAT','Go-Live']},
    {n:3,name:'Optimize',color:'#1e4d8c',s:50,e:130,
     headline:'Performance, sustained.',
     desc:'Our Client Success Team ensures solutions perform as expected long after go-live. Regular health checks, audits, and impact assessments keep outcomes sharp and measurable.',
     steps:['Audit','Impact Assessment','Utilization','Enhancement','Strategy']},
    {n:4,name:'Transform',color:'#0b9aad',s:140,e:220,
     headline:'Growth, by design.',
     desc:'Technology that revolutionizes your business is not a project with a fixed end — it\'s a living journey. Strategic guidance, trends, and thought leadership drive continuous evolution.',
     steps:['Trends','Information & Insight','Leadership','Innovation','Roadmap']}
  ];

  function rad(d){return d*Math.PI/180;}
  function pt(radius,deg){return{x:+(CX+radius*Math.cos(rad(deg))).toFixed(1),y:+(CY+radius*Math.sin(rad(deg))).toFixed(1)};}

  function donutPath(R,ri,s,e){
    var end=e<s?e+360:e,lg=(end-s)>180?1:0;
    var p1=pt(R,s),p2=pt(R,end),p3=pt(ri,end),p4=pt(ri,s);
    return 'M'+p1.x+','+p1.y+'A'+R+','+R+',0,'+lg+',1,'+p2.x+','+p2.y+'L'+p3.x+','+p3.y+'A'+ri+','+ri+',0,'+lg+',0,'+p4.x+','+p4.y+'Z';
  }

  function midDeg(p){
    var e=p.e<p.s?p.e+360:p.e,m=(p.s+e)/2;
    return m>=360?m-360:m;
  }

  function rgba(hex,a){
    var r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
    return 'rgba('+r+','+g+','+b+','+a+')';
  }

  function draw(){
    var h='';

    // Outer animated guide ring
    h+='<circle class="ff-spin" cx="'+CX+'" cy="'+CY+'" r="'+(RO+28)+'" fill="none" stroke="#c2d6ed" stroke-width="1" stroke-dasharray="5 11"/>';
    h+='<circle cx="'+CX+'" cy="'+CY+'" r="'+(RO+13)+'" fill="none" stroke="#dce9f6" stroke-width="0.5"/>';
    h+='<circle cx="'+CX+'" cy="'+CY+'" r="'+(RI-4)+'" fill="#0d1c30"/>';

    // Arc segments
    phases.forEach(function(p,i){
      var isA=i===active;
      var d=donutPath(RO,RI,p.s,p.e);
      h+='<g class="ff-seg" data-i="'+i+'">';
      h+='<path d="'+d+'" fill="'+p.color+'" opacity="'+(isA?1:0.4)+'"/>';
      if(isA) h+='<path d="'+donutPath(RO+5,RI+0,p.s+1,p.e-1)+'" fill="'+p.color+'" opacity="0.2"/>';

      // Phase number inside arc
      var sm=pt((RO+RI)/2,midDeg(p));
      h+='<text x="'+sm.x+'" y="'+sm.y+'" text-anchor="middle" dominant-baseline="central" font-size="20" font-weight="700" fill="white" opacity="'+(isA?1:0.65)+'">'+p.n+'</text>';
      h+='</g>';

      // Label outside
      var m=midDeg(p);
      var lp=pt(RO+55,m),ep=pt(RO+2,m),cp=pt(RO+45,m);
      h+='<g class="ff-seg" data-i="'+i+'">';
      h+='<line x1="'+ep.x+'" y1="'+ep.y+'" x2="'+cp.x+'" y2="'+cp.y+'" stroke="'+p.color+'" stroke-width="1" opacity="'+(isA?0.7:0.25)+'"/>';
      h+='<circle cx="'+lp.x+'" cy="'+lp.y+'" r="23" fill="'+rgba(p.color,isA?0.13:0.05)+'"/>';
      h+='<text x="'+lp.x+'" y="'+(lp.y-8)+'" text-anchor="middle" font-size="13" font-weight="700" fill="'+p.color+'" opacity="'+(isA?1:0.55)+'">'+p.name+'</text>';
      h+='<text x="'+lp.x+'" y="'+(lp.y+8)+'" text-anchor="middle" font-size="10" fill="'+(isA?'#4a6080':'#99b5cc')+'">Phase '+p.n+'</text>';
      h+='</g>';
    });

    // Clockwise flow arrows in gaps (deg+180 for clockwise tangent direction)
    [[315,phases[0].color],[45,phases[1].color],[135,phases[2].color],[225,phases[3].color]].forEach(function(ga){
      var deg=ga[0],col=ga[1];
      var ap=pt(RO+20,deg);
      h+='<g transform="translate('+ap.x+','+ap.y+') rotate('+(deg+180)+')">';
      h+='<circle r="10" fill="#ecf3fc" stroke="#ccdaec" stroke-width="1"/>';
      h+='<path d="M0,-5.5 L4,3 L0,0.5 L-4,3Z" fill="'+col+'"/>';
      h+='</g>';
    });

    // Center inner circle decoration
    h+='<circle cx="'+CX+'" cy="'+CY+'" r="'+(RI-14)+'" fill="none" stroke="#1a4070" stroke-width="1" stroke-dasharray="3 5" opacity="0.6"/>';

    // Pipeline icon in center (above text)
    var py=CY-24,px=CX-24;
    h+='<circle cx="'+px+'" cy="'+py+'" r="4" fill="#4d9fd6"/>';
    h+='<line x1="'+(px+4)+'" y1="'+py+'" x2="'+(px+14)+'" y2="'+py+'" stroke="white" stroke-width="1.8" stroke-linecap="round"/>';
    h+='<circle cx="'+(px+18)+'" cy="'+py+'" r="4" fill="#22c55e"/>';
    h+='<line x1="'+(px+22)+'" y1="'+py+'" x2="'+(px+33)+'" y2="'+py+'" stroke="white" stroke-width="1.8" stroke-linecap="round"/>';
    h+='<circle cx="'+(px+37)+'" cy="'+py+'" r="4" fill="#22c55e"/>';
    h+='<path d="M'+(px+37+4)+','+(py)+' L'+(px+37+11)+','+py+'" stroke="white" stroke-width="1.8" stroke-linecap="round"/>';
    h+='<path d="M'+(px+37+8)+','+(py-4)+' L'+(px+37+14)+','+py+' L'+(px+37+8)+','+(py+4)+'" fill="none" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>';

    var ap=phases[active];
    h+='<text x="'+CX+'" y="'+(CY+5)+'" text-anchor="middle" font-size="16" font-weight="700" fill="white">'+ap.name+'</text>';
    h+='<text x="'+CX+'" y="'+(CY+22)+'" text-anchor="middle" font-size="8.5" fill="#4ade80" letter-spacing=".12em" font-weight="700">PHASE '+ap.n+' · FUSIONFLOW360</text>';

    document.getElementById('ff360-svg').innerHTML=h;
    document.querySelectorAll('.ff-seg').forEach(function(el){
      el.addEventListener('click',function(){active=parseInt(this.dataset.i);draw();detail();});
    });
  }

  function detail(){
    var p=phases[active],col=p.color;
    var pills=p.steps.map(function(s){
      return '<span style="display:inline-flex;align-items:center;gap:5px;padding:5px 13px;background:'+rgba(col,.08)+';border:1.5px solid '+rgba(col,.3)+';border-radius:20px;font-size:12px;color:'+col+';font-weight:500;margin:3px 3px 3px 0;white-space:nowrap">'
        +'<span style="width:5px;height:5px;border-radius:50%;background:'+col+';flex-shrink:0;display:inline-block"></span>'+s+'</span>';
    }).join('');

    var nav=phases.map(function(ph,i){
      return '<span onclick="window._ff360('+i+')" style="cursor:pointer;width:9px;height:9px;border-radius:50%;background:'+(i===active?ph.color:'#cddaeb')+';display:inline-block;margin:0 3px;transition:background .2s"></span>';
    }).join('');

    document.getElementById('ff360-detail').innerHTML=
      '<div style="border-top:3px solid '+col+';padding:18px 24px 22px">'
        +'<div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:10px">'
          +'<span style="font-size:10px;font-weight:700;color:'+col+';letter-spacing:.13em;text-transform:uppercase;background:'+rgba(col,.1)+';padding:3px 10px;border-radius:4px">Phase '+p.n+'</span>'
          +'<span style="font-size:18px;font-weight:700;color:#0d1c30">'+p.name+'</span>'
          +'<span style="font-size:12.5px;color:'+col+';font-style:italic">'+p.headline+'</span>'
          +'<span style="margin-left:auto;display:flex;align-items:center">'+nav+'</span>'
        +'</div>'
        +'<p style="font-size:13px;color:#4a6080;line-height:1.7;margin-bottom:14px">'+p.desc+'</p>'
        +'<div style="display:flex;flex-wrap:wrap">'+pills+'</div>'
        +'<div style="margin-top:16px;display:flex;align-items:center;gap:8px;font-size:11px;color:#99b5cc">'
          +'<span style="height:1px;width:24px;background:#dde9f5;display:inline-block"></span>'
          +'Every phase flows into the next — circular, evolving, always in motion'
          +'<span style="height:1px;flex:1;background:#dde9f5;display:inline-block"></span>'
          +'<span onclick="window._ff360('+(( active+1)%4)+')" style="cursor:pointer;font-size:11px;color:'+phases[(active+1)%4].color+';font-weight:600;white-space:nowrap">Next: '+phases[(active+1)%4].name+' →</span>'
        +'</div>'
      +'</div>';
  }

  window._ff360=function(i){active=i;draw();detail();};
  draw();
  detail();
})();
</script>
