name: Deploy CloudConnect (Staging)

on:
  push:
    branches: [staging]

jobs:
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Apply D1 migrations (staging)
        run: npx wrangler d1 migrations apply fusionflow-staging --remote --env staging
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: 521c322a89a17bb69f91f1e65177606e

      - name: Build
        run: npm run build

      - name: Deploy Worker (staging)
        run: npx wrangler deploy --env staging
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: 521c322a89a17bb69f91f1e65177606e

      - name: Smoke test
        run: node scripts/smoke-test.mjs
        env:
          BASE_URL: https://staging.cloudconnect.packetfusion.com

      - name: Notify Zoom — Success
        if: success()
        env:
          ZOOM_WEBHOOK_URL: ${{ vars.ZOOM_WEBHOOK_URL }}
          ZOOM_AUTH_TOKEN: ${{ secrets.ZOOM_WEBHOOK_VERIFICATION_TOKEN }}
          ACTOR: ${{ github.actor }}
          COMMIT_MSG: ${{ github.event.head_commit.message }}
        run: |
          curl -s -X POST "$ZOOM_WEBHOOK_URL" \
            -H "Authorization: $ZOOM_AUTH_TOKEN" \
            -H "Content-Type: application/json" \
            -d "🟡 CloudConnect STAGING deploy succeeded | By: $ACTOR | $COMMIT_MSG"

      - name: Notify Zoom — Failure
        if: failure()
        env:
          ZOOM_WEBHOOK_URL: ${{ vars.ZOOM_WEBHOOK_URL }}
          ZOOM_AUTH_TOKEN: ${{ secrets.ZOOM_WEBHOOK_VERIFICATION_TOKEN }}
          ACTOR: ${{ github.actor }}
          COMMIT_MSG: ${{ github.event.head_commit.message }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          curl -s -X POST "$ZOOM_WEBHOOK_URL" \
            -H "Authorization: $ZOOM_AUTH_TOKEN" \
            -H "Content-Type: application/json" \
            -d "🔴 CloudConnect STAGING deploy FAILED | By: $ACTOR | $COMMIT_MSG | $RUN_URL"
