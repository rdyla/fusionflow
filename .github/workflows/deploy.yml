name: Deploy FusionFlow

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Apply D1 migrations
        run: npx wrangler d1 migrations apply fusionflow --remote
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Build
        run: npm run build

      - name: Deploy Worker
        run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Notify Zoom — Success
        if: success()
        env:
          ZOOM_WEBHOOK_URL: ${{ secrets.ZOOM_WEBHOOK_URL }}
        run: |
          jq -n \
            --arg branch "${{ github.ref_name }}" \
            --arg actor "${{ github.actor }}" \
            --arg msg "${{ github.event.head_commit.message }}" \
            --arg run_url "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            '{
              content: {
                head: { text: "✅ FusionFlow deploy succeeded" },
                body: [
                  { type: "message", text: ("Branch: " + $branch) },
                  { type: "message", text: ("By: " + $actor) },
                  { type: "message", text: $msg },
                  { type: "message", text: ("Run: " + $run_url) }
                ]
              }
            }' | curl -s -X POST "$ZOOM_WEBHOOK_URL" \
                  -H "Content-Type: application/json" \
                  -d @-

      - name: Notify Zoom — Failure
        if: failure()
        env:
          ZOOM_WEBHOOK_URL: ${{ secrets.ZOOM_WEBHOOK_URL }}
        run: |
          jq -n \
            --arg branch "${{ github.ref_name }}" \
            --arg actor "${{ github.actor }}" \
            --arg msg "${{ github.event.head_commit.message }}" \
            --arg run_url "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            '{
              content: {
                head: { text: "❌ FusionFlow deploy failed" },
                body: [
                  { type: "message", text: ("Branch: " + $branch) },
                  { type: "message", text: ("By: " + $actor) },
                  { type: "message", text: $msg },
                  { type: "message", text: ("Details: " + $run_url) }
                ]
              }
            }' | curl -s -X POST "$ZOOM_WEBHOOK_URL" \
                  -H "Content-Type: application/json" \
                  -d @-
