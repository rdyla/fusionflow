name: Deploy CloudConnect

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Apply D1 migrations
        run: npx wrangler d1 migrations apply fusionflow --remote
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Build
        run: npm run build

      - name: Deploy Worker
        run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Notify Zoom — Success
        if: success()
        env:
          ZOOM_WEBHOOK_URL: ${{ vars.ZOOM_WEBHOOK_URL }}
          ZOOM_AUTH_TOKEN: ${{ secrets.ZOOM_WEBHOOK_VERIFICATION_TOKEN }}
        run: |
          curl -s -X POST "$ZOOM_WEBHOOK_URL" \
            -H "Authorization: $ZOOM_AUTH_TOKEN" \
            -H "Content-Type: application/json" \
            -d "✅ CloudConnect deploy succeeded | Branch: ${{ github.ref_name }} | By: ${{ github.actor }} | ${{ github.event.head_commit.message }}"

      - name: Notify Zoom — Failure
        if: failure()
        env:
          ZOOM_WEBHOOK_URL: ${{ vars.ZOOM_WEBHOOK_URL }}
          ZOOM_AUTH_TOKEN: ${{ secrets.ZOOM_WEBHOOK_VERIFICATION_TOKEN }}
        run: |
          curl -s -X POST "$ZOOM_WEBHOOK_URL" \
            -H "Authorization: $ZOOM_AUTH_TOKEN" \
            -H "Content-Type: application/json" \
            -d "❌ CloudConnect deploy FAILED | Branch: ${{ github.ref_name }} | By: ${{ github.actor }} | ${{ github.event.head_commit.message }} | ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
